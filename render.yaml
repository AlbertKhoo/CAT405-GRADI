services:
  - type: web
    name: gradi-app
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        value: ""
      - key: DATABASE_PATH
        value: /data/gradi.sqlite
